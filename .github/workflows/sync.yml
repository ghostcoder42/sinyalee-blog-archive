name: Blog Archive Sync
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Cache bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run src/index.ts --config configs/sinyalee.json
      - name: Commit & Push
        run: |
          git config user.name "blog-archive-bot"
          git config user.email "bot@users.noreply.github.com"
          git add blog/
          git diff --staged --quiet || (git commit -m "chore: sync $(date -u +%Y-%m-%d)" && git push)
